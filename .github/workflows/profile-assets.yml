name: Refresh profile assets

on:
  workflow_dispatch:

  schedule:
    - cron: "17 6,18 * * *"
      timezone: "America/New_York"

  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-assets.yml"

permissions:
  contents: write

concurrency:
  group: refresh-profile-assets
  cancel-in-progress: false

jobs:
  refresh:
    name: Generate profile cards and graphics
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve current Eastern UTC offset
        id: eastern
        shell: bash
        run: |
          raw_offset="$(TZ=America/New_York date +%z)"
          sign="${raw_offset:0:1}"
          hours="${raw_offset:1:2}"
          echo "offset=${sign}$((10#$hours))" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: badgids
          BRANCH_NAME: main
          UTC_OFFSET: ${{ steps.eastern.outputs.offset }}
          THEME: github_dark
          AUTO_PUSH: false

      - name: Generate all-repositories language card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: badgids
          LANGUAGE_CARD_OUTPUT: assets/all-repositories-languages.svg
        run: python3 scripts/generate_all_repositories_language_card.py

      - name: Generate GitHub trophy card
        uses: ryo-ma/github-profile-trophy@ccb591b887775ee567c0d9a38424ddfb9b1906c4
        with:
          username: badgids
          output_path: assets/github-trophies.svg
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          theme: darkhub

      - name: Generate GitHub streak card
        uses: DenverCoder1/github-readme-streak-stats@2c2e936823881ec94120a207d7a534520eeadf8f
        with:
          path: assets/github-streak.svg
          token: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
          options: >-
            user=badgids&theme=transparent&hide_border=true&background=0D1117&ring=F9A620&fire=F9A620&currStreakLabel=F9A620&sideLabels=22D3EE&currStreakNum=FFFFFF&sideNums=FFFFFF&dates=8B949E

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: badgids
          outputs: >-
            assets/snake.svg?palette=github-dark&color_snake=#F9A620&color_dots=#0D1117,#164E63,#0891B2,#22D3EE,#F9A620

      - name: Verify generated SVG files
        shell: bash
        run: |
          set -euo pipefail

          files=(
            "profile-summary-card-output/github_dark/0-profile-details.svg"
            "profile-summary-card-output/github_dark/1-repos-per-language.svg"
            "profile-summary-card-output/github_dark/2-most-commit-language.svg"
            "profile-summary-card-output/github_dark/3-stats.svg"
            "profile-summary-card-output/github_dark/4-productive-time.svg"
            "assets/all-repositories-languages.svg"
            "assets/github-trophies.svg"
            "assets/github-streak.svg"
            "assets/snake.svg"
          )

          for file in "${files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "::error::Missing or empty SVG: $file"
              exit 1
            fi

            if ! grep -qi "<svg" "$file"; then
              echo "::error::File is not a valid SVG: $file"
              exit 1
            fi

            echo "Verified $file"
          done

      - name: Commit refreshed profile assets
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            profile-summary-card-output \
            assets/all-repositories-languages.svg \
            assets/github-trophies.svg \
            assets/github-streak.svg \
            assets/snake.svg

          if git diff --cached --quiet; then
            echo "Profile assets are already current."
            exit 0
          fi

          git commit -m "Refresh GitHub profile assets"
          git pull --rebase origin main
          git push origin HEAD:main