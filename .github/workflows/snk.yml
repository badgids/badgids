name: Generate snake animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - assets/snake.svg

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out the profile repository
        uses: actions/checkout@v4

      - name: Generate graphite, amber, and cyan snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: >-
            assets/snake.svg?palette=github-dark&color_snake=#F9A620&color_dots=#0D1117,#164E63,#0891B2,#22D3EE,#F9A620

      - name: Commit the refreshed snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/snake.svg
          git diff --cached --quiet || git commit -m "Refresh contribution snake"
          git push
